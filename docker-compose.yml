services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chaukabartan
      POSTGRES_PASSWORD: chaukabartan
      POSTGRES_DB: chaukabartan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaukabartan"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://chaukabartan:chaukabartan@db:5432/chaukabartan
      SECRET_KEY: local-dev-secret
      APP_PASSWORD: "rukojar@007"
      ENVIRONMENT: development
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      SECRET_KEY: local-dev-secret
      APP_PASSWORD: "rukojar@007"
    depends_on:
      - app

volumes:
  postgres_data:
